<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongglow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- T horizontal bar connections -->
  <line x1="40" y1="40" x2="100" y2="40" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="100" y1="40" x2="160" y2="40" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <!-- T vertical bar connections -->
  <line x1="100" y1="40" x2="100" y2="100" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
  <line x1="100" y1="100" x2="100" y2="160" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>

  <!-- Extra neural connections -->
  <line x1="40" y1="40" x2="70" y2="70" stroke="#6366f1" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <line x1="160" y1="40" x2="130" y2="70" stroke="#6366f1" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <line x1="70" y1="70" x2="130" y2="70" stroke="#6366f1" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <line x1="100" y1="100" x2="70" y2="130" stroke="#6366f1" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <line x1="100" y1="100" x2="130" y2="130" stroke="#6366f1" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <line x1="100" y1="160" x2="70" y2="130" stroke="#6366f1" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <line x1="100" y1="160" x2="130" y2="130" stroke="#6366f1" stroke-width="1" opacity="0.3" filter="url(#glow)"/>

  <!-- Nodes - main T points -->
  <circle cx="40" cy="40" r="5" fill="#8b5cf6" filter="url(#strongglow)" opacity="0.9"/>
  <circle cx="100" cy="40" r="6" fill="#8b5cf6" filter="url(#strongglow)" opacity="1"/>
  <circle cx="160" cy="40" r="5" fill="#8b5cf6" filter="url(#strongglow)" opacity="0.9"/>
  <circle cx="100" cy="100" r="5" fill="#8b5cf6" filter="url(#strongglow)" opacity="0.9"/>
  <circle cx="100" cy="160" r="5" fill="#8b5cf6" filter="url(#strongglow)" opacity="0.9"/>

  <!-- Nodes - secondary -->
  <circle cx="70" cy="40" r="3" fill="#a78bfa" filter="url(#glow)" opacity="0.8"/>
  <circle cx="130" cy="40" r="3" fill="#a78bfa" filter="url(#glow)" opacity="0.8"/>
  <circle cx="70" cy="70" r="3" fill="#a78bfa" filter="url(#glow)" opacity="0.7"/>
  <circle cx="130" cy="70" r="3" fill="#a78bfa" filter="url(#glow)" opacity="0.7"/>
  <circle cx="100" cy="130" r="3" fill="#a78bfa" filter="url(#glow)" opacity="0.8"/>
  <circle cx="70" cy="130" r="2.5" fill="#a78bfa" filter="url(#glow)" opacity="0.6"/>
  <circle cx="130" cy="130" r="2.5" fill="#a78bfa" filter="url(#glow)" opacity="0.6"/>
</svg>
