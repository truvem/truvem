<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" stroke="#7c3aed" stroke-width="3" fill="none" opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="65" stroke="#a78bfa" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Center hexagon -->
  <polygon points="100,55 138,77.5 138,122.5 100,145 62,122.5 62,77.5" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
  <!-- Inner hexagon filled -->
  <polygon points="100,72 122,84.5 122,115.5 100,128 78,115.5 78,84.5" fill="#7c3aed" opacity="0.15"/>
  <!-- Center diamond -->
  <polygon points="100,82 115,100 100,118 85,100" fill="#a78bfa" opacity="0.9"/>
  <!-- Proof chain dots -->
  <circle cx="100" cy="30" r="5" fill="#7c3aed"/>
  <circle cx="100" cy="170" r="5" fill="#7c3aed"/>
  <circle cx="30" cy="100" r="5" fill="#7c3aed"/>
  <circle cx="170" cy="100" r="5" fill="#7c3aed"/>
  <!-- Corner dots -->
  <circle cx="48" cy="48" r="4" fill="#a78bfa" opacity="0.7"/>
  <circle cx="152" cy="48" r="4" fill="#a78bfa" opacity="0.7"/>
  <circle cx="48" cy="152" r="4" fill="#a78bfa" opacity="0.7"/>
  <circle cx="152" cy="152" r="4" fill="#a78bfa" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="100" y1="35" x2="100" y2="55" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="145" x2="100" y2="165" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="35" y1="100" x2="62" y2="100" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <line x1="138" y1="100" x2="165" y2="100" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <!-- Glow effect center -->
  <circle cx="100" cy="100" r="18" fill="#7c3aed" opacity="0.25"/>
  <circle cx="100" cy="100" r="10" fill="#a78bfa" opacity="0.8"/>
  <circle cx="100" cy="100" r="5" fill="white" opacity="0.9"/>
</svg>
